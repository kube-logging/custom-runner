version: "2"
run:
  timeout: 10m
  allow-parallel-runners: true

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/kube-logging/custom-runner)
    goimports:
      local-prefixes:
        - github.com/kube-logging/custom-runner
    gofmt:
      simplify: true
    gofumpt:
      extra-rules: false

linters:
  settings:
    misspell:
      locale: US
    revive:
      confidence: 0.9
    gocyclo:
      min-complexity: 40
  enable:
    - bodyclose
    - errcheck
    - ineffassign
    - misspell
    - nolintlint
    - revive
    - gocyclo
    - unconvert
    - unparam
    - unused
    - whitespace
